<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Oposvoz - Test por voz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 1rem;
        background: #111;
        color: #eee;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 1rem;
      }
      .card {
        background: #222;
        border-radius: 6px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      button {
        margin-right: 0.5rem;
        margin-top: 0.5rem;
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #btn-cargar {
        background: #9c27b0;
        color: white;
      }
      #btn-leer {
        background: #1976d2;
        color: white;
      }
      #btn-voz {
        background: #2e7d32;
        color: white;
      }
      #btn-parar {
        background: #c62828;
        color: white;
      }
      #puntuacion,
      #estado {
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
      #log {
        margin-top: 1rem;
        font-size: 0.8rem;
        background: #1a1a1a;
        padding: 0.5rem;
        border-radius: 4px;
        max-height: 8rem;
        overflow-y: auto;
      }
      #opciones {
        margin-top: 0.5rem;
      }
      .opcion {
        display: block;
        margin: 0.3rem 0;
      }
    </style>
  </head>
  <body>
    <h1>Oposvoz - Test por voz</h1>

    <div id="puntuacion">Puntuación: 0.00</div>

    <div class="card">
      <div id="pregunta-texto">Carga un fichero de preguntas para empezar.</div>
      <div id="opciones"></div>
    </div>

    <button id="btn-cargar">Cargar preguntas (.dat)</button>
    <input id="file-input" type="file" accept=".dat,.json" style="display:none" />

    <button id="btn-leer">Leer pregunta</button>
    <button id="btn-voz">Responder por voz</button>
    <button id="btn-parar">Parar voz</button>

    <div id="estado">Estado: esperando…</div>
    <div id="log"></div>

    <script type="module">
      import { SpeechRecognition } from '@capgo/capacitor-speech-recognition';
      import { TextToSpeech } from '@capacitor-community/text-to-speech';

      let preguntas = [];
      let indiceActual = 0;
      let puntuacion = 0;
      let escuchando = false;

      const preguntaTexto = document.getElementById('pregunta-texto');
      const opcionesDiv = document.getElementById('opciones');
      const puntuacionDiv = document.getElementById('puntuacion');
      const estado = document.getElementById('estado');
      const logDiv = document.getElementById('log');

      const btnCargar = document.getElementById('btn-cargar');
      const fileInput = document.getElementById('file-input');
      const btnLeer = document.getElementById('btn-leer');
      const btnVoz = document.getElementById('btn-voz');
      const btnParar = document.getElementById('btn-parar');

      function logLine(text) {
        console.log(text);
        if (logDiv) {
          const line = document.createElement('div');
          line.textContent = text;
          logDiv.appendChild(line);
        }
      }

      function actualizarPuntuacion() {
        puntuacionDiv.textContent = 'Puntuación: ' + puntuacion.toFixed(2);
      }

      function mostrarPregunta() {
        if (preguntas.length === 0) {
          preguntaTexto.textContent =
            'No hay preguntas cargadas. Pulsa "Cargar preguntas".';
          opcionesDiv.innerHTML = '';
          return;
        }

        const p = preguntas[indiceActual];
        preguntaTexto.textContent = `(${indiceActual + 1}/${preguntas.length}) ${p.texto}`;

        opcionesDiv.innerHTML = '';
        const letras = ['a', 'b', 'c', 'd'];
        letras.forEach((letra) => {
          const textoOpcion = p.opciones[letra];
          if (!textoOpcion) return;

          const div = document.createElement('div');
          div.className = 'opcion';
          div.textContent = `${letra.toUpperCase()}) ${textoOpcion}`;
          opcionesDiv.appendChild(div);
        });

        estado.textContent =
          'Pregunta mostrada. Pulsa "Leer pregunta" o "Responder por voz".';
      }

      async function leerPreguntaActual() {
        if (preguntas.length === 0) {
          estado.textContent = 'No hay preguntas cargadas.';
          return;
        }
        const p = preguntas[indiceActual];

        const letras = ['a', 'b', 'c', 'd'];
        const partesOpciones = letras
          .map((letra) => {
            const textoOpcion = p.opciones[letra];
            if (!textoOpcion) return null;
            return `Opción ${letra.toUpperCase()}: ${textoOpcion}.`;
          })
          .filter(Boolean);

        const textoTTS =
          `Pregunta ${indiceActual + 1}. ${p.texto}. ` +
          partesOpciones.join(' ') +
          ' Di A, B, C o D para responder. Di repetir para repetir la pregunta, o di pasar para ir a la siguiente.';

        logLine('TTS: ' + textoTTS);

        await TextToSpeech.speak({
          text: textoTTS,
          locale: 'es-ES',
          rate: 1.0
        });

        estado.textContent =
          'Pregunta leída. Pulsa "Responder por voz" y di A, B, C, D, repetir o pasar.';
      }

      async function ensurePermissions() {
        const perms = await SpeechRecognition.checkPermissions();
        logLine('PERMS: ' + JSON.stringify(perms));
        if (
          perms.microphone !== 'granted' ||
          perms.speechRecognition !== 'granted'
        ) {
          await SpeechRecognition.requestPermissions();
        }
      }

      function parseComando(textoRaw) {
        const texto = textoRaw.toLowerCase();
        logLine('parseComando texto=' + texto);

        if (texto.includes('repetir') || texto.includes('repita')) {
          return { tipo: 'repetir' };
        }
        if (
          texto.includes('pasar') ||
          texto.includes('siguiente') ||
          texto.includes('otra pregunta')
        ) {
          return { tipo: 'pasar' };
        }

        // Respuestas A/B/C/D
        if (texto.match(/\b(a|á)\b/) || texto.includes('opción a')) {
          return { tipo: 'respuesta', valor: 'a' };
        }
        if (texto.match(/\bb\b/) || texto.includes('opción b')) {
          return { tipo: 'respuesta', valor: 'b' };
        }
        if (texto.match(/\bc\b/) || texto.includes('opción c')) {
          return { tipo: 'respuesta', valor: 'c' };
        }
        if (texto.match(/\bd\b/) || texto.includes('opción d')) {
          return { tipo: 'respuesta', valor: 'd' };
        }

        return { tipo: 'desconocido' };
      }

      async function corregirRespuestaVoz(valor) {
        const p = preguntas[indiceActual];

        if (valor === p.correcta) {
          puntuacion += 0.25;
          estado.textContent = `Correcta (${valor.toUpperCase()}). +0.25 puntos.`;
          logLine(`Pregunta ${p.id}: correcta (${valor}).`);
        } else {
          puntuacion -= 0.1;
          estado.textContent = `Incorrecta (${valor.toUpperCase()}). −0.1 puntos. Correcta era ${p.correcta.toUpperCase()}.`;
          logLine(`Pregunta ${p.id}: incorrecta (${valor}), correcta (${p.correcta}).`);
        }

        actualizarPuntuacion();
      }

      async function pasarPregunta() {
        const p = preguntas[indiceActual];
        estado.textContent = `Pregunta ${p.id} pasada sin responder.`;
        logLine(`Pregunta ${p.id}: pasada (0 puntos).`);

        indiceActual++;
        if (indiceActual >= preguntas.length) {
          indiceActual = preguntas.length - 1;
          estado.textContent = 'Has llegado al final del test.';
          logLine('Fin del test.');
        } else {
          mostrarPregunta();
          await leerPreguntaActual();
        }
      }

      async function repetirPregunta() {
        mostrarPregunta();
        estado.textContent = 'Pregunta repetida.';
        logLine(`Pregunta ${preguntas[indiceActual].id}: repetida.`);
        await leerPreguntaActual();
      }

      async function startListeningComando() {
        try {
          if (preguntas.length === 0) {
            estado.textContent = 'No hay preguntas cargadas.';
            return;
          }

          await ensurePermissions();

          if (escuchando) {
            logLine('Ya se está escuchando, ignorar startListeningComando');
            return;
          }

          escuchando = true;
          estado.textContent =
            'Escuchando… Di A, B, C, D, repetir o pasar.';

          SpeechRecognition.removeAllListeners?.();

          let bufferTexto = '';

          SpeechRecognition.addListener('partialResults', (data) => {
            const text = data.value || data.matches || '';
            const finalText = Array.isArray(text) ? text.join(' ') : text;
            if (finalText) {
              bufferTexto = finalText;
              logLine('partialResults: ' + bufferTexto);
            }
          });

          SpeechRecognition.addListener('results', async (data) => {
            const text = data.value || data.matches || '';
            const finalText = Array.isArray(text) ? text.join(' ') : text;
            logLine('results: ' + finalText);

            const comando = parseComando(finalText || bufferTexto);

            if (comando.tipo === 'respuesta') {
              await corregirRespuestaVoz(comando.valor);
              escuchando = false;
            } else if (comando.tipo === 'repetir') {
              await repetirPregunta();
              escuchando = false;
            } else if (comando.tipo === 'pasar') {
              await pasarPregunta();
              escuchando = false;
            } else {
              estado.textContent =
                'No se ha entendido el comando. Di A, B, C, D, repetir o pasar.';
              logLine('Comando desconocido, sigue escuchando.');
            }
          });

          SpeechRecognition.addListener('error', (data) => {
            logLine('error: ' + JSON.stringify(data));
            estado.textContent = 'Error en reconocimiento de voz.';
            escuchando = false;
          });

          SpeechRecognition.addListener('speechEnd', () => {
            logLine('speechEnd');
          });

          await SpeechRecognition.start({
            locale: 'es-ES',
            partialResults: true
          });
        } catch (err) {
          console.error(err);
          logLine('startListeningComando error: ' + (err?.message || String(err)));
          estado.textContent = 'Error al iniciar reconocimiento.';
          escuchando = false;
        }
      }

      async function stopListening() {
        try {
          await SpeechRecognition.stop();
          escuchando = false;
          estado.textContent = 'Estado: voz parada.';
          logLine('Reconocimiento parado manualmente.');
        } catch (err) {
          console.error(err);
          logLine('stopListening error: ' + (err?.message || String(err)));
        }
      }

      // Cargar preguntas desde un fichero local (.dat/.json)
      btnCargar.onclick = () => {
        fileInput.click();
      };

      fileInput.onchange = () => {
        const file = fileInput.files?.[0];
        if (!file) {
          estado.textContent = 'No se ha seleccionado ningún fichero.';
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const contenido = reader.result;
            const json = JSON.parse(contenido);
            if (!Array.isArray(json)) {
              throw new Error('El fichero no contiene un array de preguntas.');
            }
            preguntas = json;
            indiceActual = 0;
            puntuacion = 0;
            actualizarPuntuacion();
            mostrarPregunta();
            estado.textContent = `Preguntas cargadas desde fichero (${preguntas.length} preguntas).`;
            logLine(
              `Cargadas ${preguntas.length} preguntas desde fichero local.`
            );
          } catch (err) {
            console.error(err);
            estado.textContent = 'Error leyendo el fichero de preguntas.';
            logLine('Error leyendo fichero: ' + (err?.message || String(err)));
          }
        };
        reader.onerror = () => {
          estado.textContent = 'Error leyendo el fichero.';
        };
        reader.readAsText(file, 'utf-8');
      };

      btnLeer.onclick = () => {
        leerPreguntaActual();
      };

      btnVoz.onclick = () => {
        startListeningComando();
      };

      btnParar.onclick = () => {
        stopListening();
      };
    </script>
  </body>
</html>
