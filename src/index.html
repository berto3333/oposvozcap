<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Oposvoz - Test por voz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 1rem;
        background: #111;
        color: #eee;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 1rem;
      }
      .card {
        background: #222;
        border-radius: 6px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      button {
        margin-right: 0.5rem;
        margin-top: 0.5rem;
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      #btn-cargar {
        background: #9c27b0;
        color: white;
      }
      #btn-empezar {
        background: #1976d2;
        color: white;
      }
      #btn-parar {
        background: #c62828;
        color: white;
      }
      #puntuacion,
      #estado {
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
      #log {
        margin-top: 1rem;
        font-size: 0.8rem;
        background: #1a1a1a;
        padding: 0.5rem;
        border-radius: 4px;
        max-height: 8rem;
        overflow-y: auto;
      }
      #opciones {
        margin-top: 0.5rem;
      }
      .opcion {
        display: block;
        margin: 0.3rem 0;
      }
    </style>
  </head>
  <body>
    <h1>Oposvoz - Test por voz</h1>

    <div id="puntuacion">Puntuación: 0.00</div>

    <div class="card">
      <div id="pregunta-texto">Carga un fichero de preguntas para empezar.</div>
      <div id="opciones"></div>
    </div>

    <button id="btn-cargar">Cargar preguntas (.dat)</button>
    <input id="file-input" type="file" accept=".dat,.json" style="display:none" />

    <button id="btn-empezar">Empezar</button>
    <button id="btn-parar" disabled>Parar</button>

    <div id="estado">Estado: esperando…</div>
    <div id="log"></div>

    <script type="module">
      import { SpeechRecognition } from '@capgo/capacitor-speech-recognition';
      import { TextToSpeech } from '@capacitor-community/text-to-speech';

      let preguntas = [];
      let indiceActual = 0;
      let puntuacion = 0;
      let escuchando = false;
      let flujoActivo = false;
      let timeoutId = null;
      let sesionTerminada = false;

      const preguntaTexto = document.getElementById('pregunta-texto');
      const opcionesDiv = document.getElementById('opciones');
      const puntuacionDiv = document.getElementById('puntuacion');
      const estado = document.getElementById('estado');
      const logDiv = document.getElementById('log');

      const btnCargar = document.getElementById('btn-cargar');
      const fileInput = document.getElementById('file-input');
      const btnEmpezar = document.getElementById('btn-empezar');
      const btnParar = document.getElementById('btn-parar');

      function logLine(text) {
        console.log(text);
        if (logDiv) {
          const line = document.createElement('div');
          line.textContent = text;
          logDiv.appendChild(line);
        }
      }

      function actualizarPuntuacion() {
        puntuacionDiv.textContent = 'Puntuación: ' + puntuacion.toFixed(2);
      }

      function mostrarPregunta() {
        if (preguntas.length === 0) {
          preguntaTexto.textContent = 'No hay preguntas cargadas. Pulsa "Cargar preguntas".';
          opcionesDiv.innerHTML = '';
          return;
        }

        const p = preguntas[indiceActual];
        preguntaTexto.textContent = `(${indiceActual + 1}/${preguntas.length}) ${p.texto}`;

        opcionesDiv.innerHTML = '';
        const letras = ['a', 'b', 'c', 'd'];
        letras.forEach((letra) => {
          const textoOpcion = p.opciones[letra];
          if (!textoOpcion) return;

          const div = document.createElement('div');
          div.className = 'opcion';
          div.textContent = `${letra.toUpperCase()}) ${textoOpcion}`;
          opcionesDiv.appendChild(div);
        });
      }

      function limpiarTimeout() {
        if (timeoutId !== null) {
          clearTimeout(timeoutId);
          timeoutId = null;
        }
      }

      async function detenerReconocimiento() {
        try {
          escuchando = false;
          await SpeechRecognition.stop();
        } catch (e) {
          // ignore
        }
      }

      async function ensurePermissions() {
        const perms = await SpeechRecognition.checkPermissions();
        logLine('PERMS: ' + JSON.stringify(perms));
        if (perms.microphone !== 'granted' || perms.speechRecognition !== 'granted') {
          await SpeechRecognition.requestPermissions();
        }
      }

      function parseComando(textoRaw) {
        const texto = textoRaw.toLowerCase();
        logLine('→ parseComando: "' + texto + '"');

        if (texto.includes('repetir') || texto.includes('repita')) {
          return { tipo: 'repetir' };
        }
        if (texto.includes('pasar') || texto.includes('siguiente') || texto.includes('otra pregunta')) {
          return { tipo: 'pasar' };
        }

        if (texto.match(/\b(a|á)\b/) || texto.includes('opción a')) {
          return { tipo: 'respuesta', valor: 'a' };
        }
        if (texto.match(/\bb\b/) || texto.includes('opción b')) {
          return { tipo: 'respuesta', valor: 'b' };
        }
        if (texto.match(/\bc\b/) || texto.includes('opción c')) {
          return { tipo: 'respuesta', valor: 'c' };
        }
        if (texto.match(/\bd\b/) || texto.includes('opción d')) {
          return { tipo: 'respuesta', valor: 'd' };
        }

        return { tipo: 'desconocido' };
      }

      async function corregirRespuestaVoz(valor) {
        const p = preguntas[indiceActual];

        if (valor === p.correcta) {
          puntuacion += 0.25;
          estado.textContent = 'Correcta (' + valor.toUpperCase() + '). +0.25 puntos.';
          logLine('Pregunta ' + p.id + ': correcta (' + valor + ').');
        } else {
          puntuacion -= 0.1;
          estado.textContent = 'Incorrecta (' + valor.toUpperCase() + '). −0.1 puntos. Correcta era ' + p.correcta.toUpperCase() + '.';
          logLine('Pregunta ' + p.id + ': incorrecta (' + valor + '), correcta (' + p.correcta + ').');
        }

        actualizarPuntuacion();
      }

      async function leerPreguntaActual() {
        if (preguntas.length === 0) {
          estado.textContent = 'No hay preguntas cargadas.';
          return;
        }
        const p = preguntas[indiceActual];

        const letras = ['a', 'b', 'c', 'd'];
        const partesOpciones = letras
          .map((letra) => {
            const textoOpcion = p.opciones[letra];
            if (!textoOpcion) return null;
            return 'Opción ' + letra.toUpperCase() + ': ' + textoOpcion + '.';
          })
          .filter(Boolean);

        const textoTTS =
          'Pregunta ' + (indiceActual + 1) + '. ' + p.texto + '. ' +
          partesOpciones.join(' ') +
          ' Di A, B, C o D para responder. Di repetir para repetir la pregunta, o di pasar para ir a la siguiente.';

        logLine('TTS: ' + textoTTS);

        await TextToSpeech.speak({
          text: textoTTS,
          lang: 'es-ES',
          rate: 1.0
        });
      }

      async function avanzarSiguiente() {
        indiceActual++;
        if (indiceActual >= preguntas.length) {
          flujoActivo = false;
          btnEmpezar.disabled = false;
          btnParar.disabled = true;
          estado.textContent = 'Test completado. Puntuación final: ' + puntuacion.toFixed(2);
          logLine('Fin del test.');
          return true;
        }
        mostrarPregunta();
        return false;
      }

      async function procesarResultado(texto) {
        if (!flujoActivo) return;

        const comando = parseComando(texto);

        if (comando.tipo === 'respuesta') {
          await corregirRespuestaVoz(comando.valor);
          await new Promise(r => setTimeout(r, 2000));
          if (!flujoActivo) return;
          const fin = await avanzarSiguiente();
          if (!fin) await iniciarCiclo();

        } else if (comando.tipo === 'repetir') {
          estado.textContent = 'Repitiendo pregunta…';
          await new Promise(r => setTimeout(r, 500));
          if (!flujoActivo) return;
          await iniciarCiclo();

        } else if (comando.tipo === 'pasar') {
          const p = preguntas[indiceActual];
          estado.textContent = 'Pregunta ' + p.id + ' pasada sin responder.';
          logLine('Pregunta ' + p.id + ': pasada (0 puntos).');
          await new Promise(r => setTimeout(r, 1500));
          if (!flujoActivo) return;
          const fin = await avanzarSiguiente();
          if (!fin) await iniciarCiclo();

        } else {
          estado.textContent = 'No se ha entendido: "' + texto.substring(0, 60) + '". Di A, B, C, D, repetir o pasar.';
          await new Promise(r => setTimeout(r, 1500));
          if (!flujoActivo) return;
          await escucharComando();
        }
      }

      async function iniciarCiclo() {
        if (!flujoActivo) return;

        estado.textContent = 'Leyendo pregunta ' + (indiceActual + 1) + ' de ' + preguntas.length + '...';
        await leerPreguntaActual();

        if (!flujoActivo) return;

        await escucharComando();
      }

      async function escucharComando() {
        try {
          if (preguntas.length === 0 || !flujoActivo) return;

          await ensurePermissions();

          if (escuchando) return;

          escuchando = true;
          sesionTerminada = false;
          estado.textContent = 'Escuchando…';

          SpeechRecognition.removeAllListeners?.();

          let bufferTexto = '';

          SpeechRecognition.addListener('partialResults', (data) => {
            const text = data.matches || '';
            const finalText = Array.isArray(text) ? text.join(' ') : text;
            if (finalText) {
              bufferTexto = finalText;
              logLine('Reconociendo: ' + finalText);
            }
          });

          SpeechRecognition.addListener('listeningState', async (data) => {
            if (data.state === 'stopped' && flujoActivo && !sesionTerminada) {
              sesionTerminada = true;
              escuchando = false;
              limpiarTimeout();

              if (bufferTexto) {
                logLine('Detectado: ' + bufferTexto);
                await procesarResultado(bufferTexto);
              }
            }
          });

          SpeechRecognition.addListener('error', (data) => {
            logLine('error: ' + JSON.stringify(data));
            if (flujoActivo && !sesionTerminada) {
              sesionTerminada = true;
              escuchando = false;
              limpiarTimeout();
              estado.textContent = 'Error en reconocimiento. Reintentando…';
              setTimeout(() => { if (flujoActivo) iniciarCiclo(); }, 1500);
            }
          });

          await SpeechRecognition.start({
            language: 'es-ES',
            partialResults: true
          });

          limpiarTimeout();
          timeoutId = setTimeout(async () => {
            if (!flujoActivo || sesionTerminada) return;
            sesionTerminada = true;
            escuchando = false;
            await detenerReconocimiento();
            const p = preguntas[indiceActual];
            estado.textContent = 'Tiempo agotado. Pregunta ' + p.id + ' no respondida (0 puntos).';
            logLine('Pregunta ' + p.id + ': timeout (0 puntos).');
            await new Promise(r => setTimeout(r, 1500));
            if (!flujoActivo) return;
            const fin = await avanzarSiguiente();
            if (!fin) await iniciarCiclo();
          }, 20000);

        } catch (err) {
          console.error(err);
          logLine('escucharComando error: ' + (err?.message || String(err)));
          escuchando = false;
          if (flujoActivo) {
            estado.textContent = 'Error al iniciar reconocimiento. Reintentando…';
            setTimeout(() => { if (flujoActivo) iniciarCiclo(); }, 1500);
          }
        }
      }

      async function empezarClicked() {
        if (preguntas.length === 0) {
          estado.textContent = 'Primero carga un fichero de preguntas.';
          return;
        }

        indiceActual = 0;
        puntuacion = 0;
        flujoActivo = true;
        btnEmpezar.disabled = true;
        btnParar.disabled = false;
        actualizarPuntuacion();
        mostrarPregunta();
        logLine('--- INICIO DEL TEST ---');

        await iniciarCiclo();
      }

      async function pararClicked() {
        flujoActivo = false;
        limpiarTimeout();
        await detenerReconocimiento();
        btnEmpezar.disabled = false;
        btnParar.disabled = true;
        estado.textContent = 'Test detenido.';
        logLine('Test detenido por el usuario.');
      }

      btnCargar.onclick = () => {
        if (flujoActivo) return;
        fileInput.click();
      };

      fileInput.onchange = () => {
        if (flujoActivo) return;
        const file = fileInput.files?.[0];
        if (!file) {
          estado.textContent = 'No se ha seleccionado ningún fichero.';
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const contenido = reader.result;
            const json = JSON.parse(contenido);
            if (!Array.isArray(json)) {
              throw new Error('El fichero no contiene un array de preguntas.');
            }
            preguntas = json;
            indiceActual = 0;
            puntuacion = 0;
            actualizarPuntuacion();
            mostrarPregunta();
            estado.textContent = 'Preguntas cargadas (' + preguntas.length + ' preguntas). Pulsa "Empezar" para iniciar el test.';
            logLine('Cargadas ' + preguntas.length + ' preguntas desde fichero local.');
          } catch (err) {
            console.error(err);
            estado.textContent = 'Error leyendo el fichero de preguntas.';
            logLine('Error leyendo fichero: ' + (err?.message || String(err)));
          }
        };
        reader.onerror = () => {
          estado.textContent = 'Error leyendo el fichero.';
        };
        reader.readAsText(file, 'utf-8');
      };

      btnEmpezar.onclick = empezarClicked;
      btnParar.onclick = pararClicked;
    </script>
  </body>
</html>
