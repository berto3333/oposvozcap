<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Oposvoz - Speech to Text</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 1rem;
        background: #111;
        color: #eee;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 1rem;
      }
      button {
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #btn-start {
        background: #2e7d32;
        color: white;
      }
      #btn-stop {
        background: #c62828;
        color: white;
      }
      #status {
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
      #output {
        margin-top: 1rem;
        padding: 0.75rem;
        min-height: 6rem;
        background: #222;
        border-radius: 4px;
        white-space: pre-wrap;
      }
      #log {
        margin-top: 1rem;
        font-size: 0.8rem;
        background: #1a1a1a;
        padding: 0.5rem;
        border-radius: 4px;
        max-height: 8rem;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h1>Oposvoz - Dictado a texto</h1>

    <button id="btn-start">Empezar a dictar</button>
    <button id="btn-stop">Parar</button>

    <div id="status">Estado: parado</div>
    <div id="output">Aquí aparecerá el texto dictado…</div>
    <div id="log"></div>

    <script type="module">
      import { SpeechRecognition } from '@capgo/capacitor-speech-recognition';

      const output = document.getElementById('output');
      const status = document.getElementById('status');
      const btnStart = document.getElementById('btn-start');
      const btnStop = document.getElementById('btn-stop');
      const log = document.getElementById('log');

      function logLine(text) {
        console.log(text);
        if (log) {
          const line = document.createElement('div');
          line.textContent = text;
          log.appendChild(line);
        }
      }

      function setOutput(text) {
        output.textContent = text;
        logLine('OUTPUT: ' + text);
      }

      async function ensurePermissions() {
        const perms = await SpeechRecognition.checkPermissions();
        logLine('PERMS: ' + JSON.stringify(perms));
        if (
          perms.microphone !== 'granted' ||
          perms.speechRecognition !== 'granted'
        ) {
          await SpeechRecognition.requestPermissions();
        }
      }

      async function startListening() {
        try {
          status.textContent = 'Estado: solicitando permisos…';
          await ensurePermissions();

          status.textContent = 'Estado: escuchando…';
          setOutput('...');

          // Por si acaso limpiamos listeners anteriores
          SpeechRecognition.removeAllListeners?.();

          // resultados parciales mientras hablas
          SpeechRecognition.addListener('partialResults', (data) => {
            logLine('partialResults: ' + JSON.stringify(data));
            const text = data.value || data.matches || '';
            if (text) {
              const finalText = Array.isArray(text) ? text.join(' ') : text;
              setOutput(finalText);
            }
          });

          // resultado final cuando termina
          SpeechRecognition.addListener('results', (data) => {
            logLine('results: ' + JSON.stringify(data));
            const text = data.value || data.matches || '';
            if (text) {
              const finalText = Array.isArray(text) ? text.join(' ') : text;
              setOutput(finalText);
              status.textContent = 'Estado: frase reconocida';
            }
          });

          SpeechRecognition.addListener('error', (data) => {
            logLine('error: ' + JSON.stringify(data));
            status.textContent = 'Error: ' + JSON.stringify(data);
          });

          SpeechRecognition.addListener('speechStart', () => {
            logLine('speechStart');
            status.textContent = 'Estado: hablando…';
          });

          SpeechRecognition.addListener('speechEnd', () => {
            logLine('speechEnd');
            status.textContent = 'Estado: silencio…';
          });

          await SpeechRecognition.start({
            locale: 'es-ES',
            partialResults: true
          });
        } catch (err) {
          console.error(err);
          logLine('startListening error: ' + (err?.message || String(err)));
          status.textContent = 'Error al iniciar reconocimiento';
        }
      }

      async function stopListening() {
        try {
          await SpeechRecognition.stop();
          status.textContent = 'Estado: parado';
          logLine('Reconocimiento parado manualmente');
        } catch (err) {
          console.error(err);
          logLine('stopListening error: ' + (err?.message || String(err)));
          status.textContent = 'Error al parar reconocimiento';
        }
      }

      btnStart.onclick = startListening;
      btnStop.onclick = stopListening;
    </script>
  </body>
</html>
